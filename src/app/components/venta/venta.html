<section id="venta">
  <div class="section-header fade-in">
    <span class="section-label">Disponibilidad</span>
    <h2>Proyectos en Venta</h2>
  </div>

  <!-- Indicador de carga mientras el componente espera respuesta del backend -->
  <p class="estado-carga" *ngIf="cargando">Cargando disponibilidad...</p>

  <!-- Mensaje de error si la conexión con el PHP falla -->
  <p class="estado-error" *ngIf="error">{{ error }}</p>

  <!-- Tabla: solo se muestra cuando los datos llegaron correctamente -->
  <div class="table-wrapper fade-in" *ngIf="!cargando && !error">
    <table>
      <caption class="sr-only">Lista de proyectos disponibles con precios</caption>
      <thead>
        <tr>
          <th scope="col">Proyecto</th>
          <th scope="col">Ubicación</th>
          <th scope="col">Estado</th>
          <th scope="col">Precio desde</th>
        </tr>
      </thead>
      <tbody>
        <!-- *ngFor itera sobre el array proyectosVenta y genera una fila por cada elemento -->
        <tr *ngFor="let item of proyectosVenta">
          <td>{{ item.proyecto }}</td>
          <td>{{ item.ubicacion }}</td>
          <td>{{ item.estado }}</td>
          <td class="price-cell">{{ item.precio }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
