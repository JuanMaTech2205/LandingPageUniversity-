<section id="contacto">
  <div class="contact-grid">

    <div class="contact-info fade-in">
      <div class="section-header">
        <span class="section-label">Contacto</span>
        <h2>Contáctanos</h2>
      </div>
      <p>
        Estamos disponibles para atenderte de lunes a viernes<br />
        de 8:00 am a 6:00 pm.<br /><br />
        <strong>Email:</strong> info&#64;elprogreso.com<br />
        <strong>Teléfono:</strong> +57 (1) 234 5678<br />
        <strong>Dirección:</strong> Cra. 7 #32-16, Bogotá
      </p>
    </div>

    <form id="formulario" class="contact-form fade-in" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label for="nombre">Nombre completo</label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          placeholder="Tu nombre"
          [(ngModel)]="formData.nombre"
          required
          autocomplete="name"
        />
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="tu@correo.com"
          [(ngModel)]="formData.email"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="mensaje">Mensaje</label>
        <textarea
          id="mensaje"
          name="mensaje"
          rows="5"
          placeholder="¿En qué proyecto estás interesado?"
          [(ngModel)]="formData.mensaje"
          required
          (input)="onMensajeInput()"
        ></textarea>
        <small [style.color]="mensajeColor">{{ mensajeContador }} caracteres</small>
      </div>

        <!-- El botón se deshabilita mientras se está enviando para evitar envíos duplicados -->
      <!-- [disabled] es binding de propiedad: deshabilita el botón cuando enviando es true -->
      <button type="submit" class="btn-primary" [disabled]="enviando">
        <!-- Muestra texto diferente según el estado del envío -->
        {{ enviando ? 'Enviando...' : 'Enviar mensaje' }}
      </button>

      <!-- Mensaje de éxito: visible solo cuando el servidor confirmó el guardado -->
      <p class="form-success" *ngIf="enviado">
        ¡Mensaje enviado con éxito! Estaremos en contacto pronto.
      </p>

      <!-- Mensaje de error: visible si hubo validación fallida o error de conexión -->
      <p class="form-error" *ngIf="errorEnvio">{{ errorEnvio }}</p>

    </form>

  </div>
</section>
